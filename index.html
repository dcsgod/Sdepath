<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SDE — 7-Month Full Stack + DevOps Roadmap</title>

<style>

  *{box-sizing:border-box;margin:0;padding:0}

  :root{

    --bg:#0f0c29;--bg2:#1a1740;--bg3:#221f4a;

    --card:#1e1b3a;--card2:#252245;

    --blue:#4f8ef7;--purple:#a855f7;--teal:#2dd4bf;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--pink:#ec4899;

    --text:#e2e0ff;--muted:#8b85c1;--border:#2e2a5a;

    --grad:linear-gradient(135deg,#4f8ef7,#a855f7)

  }

  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  

  /* TOP PROGRESS BAR */

  #topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,12,41,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}

  .nav-inner{max-width:1100px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}

  .logo{font-size:18px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:8px;flex-shrink:0}

  .nav-tabs{display:flex;gap:4px;flex-wrap:wrap;flex:1}

  .tab{padding:5px 11px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;white-space:nowrap}

  .tab:hover{border-color:var(--blue);color:var(--blue)}

  .tab.active{background:var(--grad);border-color:transparent;color:#fff;font-weight:600}

  .tab.done{border-color:var(--green);color:var(--green)}

  .overall-bar{width:100%;height:3px;background:var(--border);border-radius:2px}

  .overall-fill{height:100%;background:var(--grad);border-radius:2px;transition:width .5s}



  /* MAIN */

  main{max-width:1100px;margin:0 auto;padding:80px 16px 40px}



  /* HOME */

  #page-home{display:block}

  .hero{text-align:center;padding:40px 0 32px}

  .hero h1{font-size:clamp(28px,5vw,48px);font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}

  .hero p{color:var(--muted);font-size:15px;max-width:560px;margin:0 auto 24px}

  .overall-stat{font-size:13px;color:var(--muted);margin-top:8px}

  .month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;margin-top:8px}

  .month-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:all .2s}

  .month-card:hover{border-color:var(--blue);transform:translateY(-2px)}

  .month-card.complete{border-color:var(--green)}

  .mc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}

  .mc-num{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}

  .mc-title{font-size:14px;font-weight:600;line-height:1.3}

  .mc-sub{font-size:12px;color:var(--muted);margin-top:2px}

  .mc-bar-wrap{height:6px;background:var(--border);border-radius:3px;margin:10px 0 6px}

  .mc-bar{height:100%;border-radius:3px;transition:width .5s}

  .mc-pct{font-size:12px;color:var(--muted)}

  .badge-done{font-size:11px;background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);padding:2px 8px;border-radius:10px}



  /* MONTH PAGE */

  .month-page{display:none}

  .month-page.active{display:block}

  .month-header{padding:24px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}

  .mh-top{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}

  .mh-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}

  .mh-info h2{font-size:clamp(18px,3vw,26px);font-weight:700;margin-bottom:4px}

  .mh-info p{color:var(--muted);font-size:14px}

  .mh-stats{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}

  .mh-stat{font-size:13px;color:var(--muted)}

  .mh-stat b{color:var(--text)}

  .progress-row{display:flex;align-items:center;gap:12px;margin-top:16px}

  .progress-wrap{flex:1;height:8px;background:var(--border);border-radius:4px}

  .progress-fill{height:100%;border-radius:4px;transition:width .4s}

  .progress-pct{font-size:14px;font-weight:600;min-width:40px;text-align:right}



  /* SECTIONS */

  .section{margin-bottom:32px}

  .section-title{font-size:16px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}

  .section-title::before{content:'';display:inline-block;width:3px;height:18px;border-radius:2px;background:var(--grad)}



  /* SKILLS CHIPS */

  .skills-wrap{display:flex;flex-wrap:wrap;gap:8px}

  .skill-chip{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--muted)}



  /* TOPICS */

  .topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}

  .topic-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:all .2s}

  .topic-item:hover{border-color:var(--blue)}

  .topic-item.checked{background:rgba(34,197,94,0.05);border-color:rgba(34,197,94,0.3)}

  .topic-item.checked .topic-text{text-decoration:line-through;color:var(--muted)}

  .chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}

  .chk.on{background:var(--green);border-color:var(--green)}

  .chk.on::after{content:'✓';font-size:11px;color:#fff;font-weight:700}

  .topic-text{font-size:13px;line-height:1.4}



  /* RESOURCES */

  .resources-outer{display:flex;flex-direction:column;gap:20px}

  .res-block{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}

  .res-block-title{padding:12px 16px;background:var(--card2);font-size:14px;font-weight:600;border-bottom:1px solid var(--border)}

  .res-links{padding:12px 16px;display:flex;flex-direction:column;gap:8px}

  .res-link{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);padding:8px 10px;border-radius:8px;transition:background .2s;font-size:13px}

  .res-link:hover{background:var(--bg3)}

  .res-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

  .yt{background:rgba(239,68,68,0.15);color:#ef4444}

  .ud{background:rgba(168,85,247,0.15);color:#a855f7}

  .doc{background:rgba(79,142,247,0.15);color:#4f8ef7}

  .res-meta{flex:1;min-width:0}

  .res-meta b{display:block;font-size:13px}

  .res-meta span{font-size:11px;color:var(--muted)}

  .res-arrow{color:var(--muted);font-size:12px}



  /* RESET BTN */

  .reset-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;transition:all .2s}

  .reset-btn:hover{border-color:var(--red);color:var(--red)}



  /* CONFETTI */

  #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}



  /* COMPLETE BANNER */

  .complete-banner{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px;margin-bottom:20px}

  .cb-icon{font-size:24px}

  .cb-text b{display:block;color:var(--green);font-size:15px}

  .cb-text span{font-size:13px;color:var(--muted)}



  /* BACK BTN */

  .back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:20px;display:inline-flex;align-items:center;gap:6px;transition:all .2s}

  .back-btn:hover{border-color:var(--blue);color:var(--blue)}



  @media(max-width:600px){

    .mh-top{flex-direction:column}

    .topics-grid{grid-template-columns:1fr}

  }

</style>

</head>
